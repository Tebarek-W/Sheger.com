name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Mobile (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sheger-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sheger-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

  admin:
    name: Admin (Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sheger-admin
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sheger-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
