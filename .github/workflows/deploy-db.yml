# Manual database deploy only — does not run on every push.
# Add GitHub secrets before running: SUPABASE_ACCESS_TOKEN, SUPABASE_PRODUCTION_PROJECT_REF
# Run from: Actions → Deploy Database → Run workflow

name: Deploy Database

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Supabase db push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push
